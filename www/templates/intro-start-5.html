<ion-view>

  <style>
    .color-grey {
      color: #5f6e7b;
    }

    .tab-item-2-intro {
      color: #5f6e7b !important;
    }

    .swiper-pagination-bullet-active {
      opacity: 1;
      background: rgba(16, 154, 7, 0.5) !important;
    }


    .swiper-pagination-bullet {
      width: 9px;
      height: 9px;
      display: inline-block;
      border-radius: 10px;
      background: #13d105;
    }
    .buttondemoDense section {
      text-align: center;
      margin: 8px;
      position: relative !important;
    }
    .buttondemoDense .label {
      position: absolute;
      bottom: 5px;
      left: 7px;
      font-size: 12px;
    }

    .swiper-slide {
      background-image: url('images/background-step.png')!important;
      background-size: 100% 100%;
    }

    .style-text1{
      font-weight: lighter;
      text-align: center;
      font-size: 20px;
      display: flex;

    }
    .style-div1{
      display: flex;
      bottom: 80%;
    }
    .style-text2{
      font-weight: lighter;
      color: #7c818c;
      text-align: center;
      font-size: 20px;
      display: flex;
      left: 500px;
      top: 400px;
      width: 100px;
    }
    .style-div2{
      display: flex;
      bottom: 30%;
    }
    .div-button{
      position: fixed;
      display: flex;
      bottom: 10%;
      align-items: center;
    }
    .button{
      background: linear-gradient(#5f6e7b, #92d4be);
      width: 200px;
      height: 50px;
      border-radius: 30px;
      color: white;
    }
    .color-black {
      color: #5f6e7b;
    }
    .div-slide-step {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-content: center;
      align-items: center;
      flex-direction: column;
      gap: 20px;
      justify-content: space-between;
      padding-top: 80px;
      padding-bottom: 200px;
    }
  </style>

  <ion-content scroll="false" class="fade-in-center div-content" style="background: linear-gradient(#90d08a, #fcfafa);">

    <div class="div-header-intro">
      <label class="color-grey font-weight-bold"><b class="color-black">{{ realIndexSwiper }}</b>/{{ swiper.slides.length }}</label>
      <label ng-if="realIndexSwiper != swiper.slides.length" ng-click="gologin()" class="color-black font-weight-bold"></label>
    </div>

    <div class="swiper-container">
      <div class="swiper-wrapper">
        <div class="swiper-slide">

          <div class="div-slide-step">
            <div style="" class="style-div1">
              <div class="style-text1">
                SUPORT THE FOREST <br> AND REAP THE <br> BENEFITS
              </div>
            </div>

            <div style="" class="style-div2">
              <div class="style-text2">
                  I buy end l become <br> the owner of trees.
              </div>
            </div>
          </div>

        </div>
        <div class="swiper-slide">

          <div class="div-slide-step">
            <div style="" class="style-div1">
              <div class="style-text1">
                ALGO DE CONTENIDO <br> PARA REALIZAR <br> EFECTO
              </div>
            </div>

            <div style="" class="style-div2">
              <div class="style-text2">
                I love <br> ice cream.
              </div>
            </div>
          </div>

        </div>
        <div class="swiper-slide">

          <div class="div-slide-step">
            <div style="" class="style-div1">
              <div class="style-text1">
                SUPORT THE FOREST <br> AND REAP THE <br> BENEFITS
              </div>
            </div>

            <div style="" class="style-div2">
              <div class="style-text2">
                I buy end l become <br> the owner of trees.
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Add Pagination -->
      <div class="swiper-pagination"></div>

    </div>

    <div class="div-footer-intro">

      <label ng-if="realIndexSwiper == 1" class="color-grey font-weight-bold"></label>
      <label ng-if="realIndexSwiper > 1" ng-click="back_intro()" class="color-grey font-weight-bold">Anterior</label>
      <label ng-if="realIndexSwiper < 3" ng-click="next_intro()" class="tab-item-2-intro font-weight-bold">Siguiente</label>
      <!--<label ng-if="realIndexSwiper == swiper.slides.length" ng-click="gologin()" class="tab-item-2-intro font-weight-bold">Comenzar</label>-->
    </div>

  </ion-content>
</ion-view>
