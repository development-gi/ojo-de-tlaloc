
<ion-popover-view style="height: 100px!important">

  <ion-content overflow-scroll="false">
    <div class="list">
      <ion-item ng-click="selectGender('M')" style="padding: 10px;border: none">
        <label class="texto-modal">Masculino</label>
      </ion-item>
      <ion-item ng-click="selectGender('F')" style="padding: 10px;border: none">
        <label class="texto-modal">Femenino</label>
      </ion-item>
    </div>
  </ion-content>
</ion-popover-view>
