<div class="take-picture-content">
  <div align="center" class="margin-bottom-10">
    <br>
    <label class="titulo-modal font-weight-bold primary-text-color">{{ "TAKE_PICTURE_LBL_1" | translate }}</label>
  </div>
  <br>
  <div align="center" class="take-picture-div-table">
    <table class="width-100-percentage">
      <tr>
        <td class="take-picture-icon">
          <div align="bottom" ng-click="takeGallery()">
            <img src="images/new/galery.svg" width="45px">
            <br/>
            {{ "TAKE_PICTURE_LBL_2" | translate }}
          </div>
        </td>
        <td class="width-10-percentage"></td>
        <td class="take-picture-icon">
          <div align="bottom" ng-click="photo_add()">
            <img src="images/new/camera-press.svg" width="45px">
            <br/>
            {{ "TAKE_PICTURE_LBL_3" | translate }}
          </div>
        </td>
      </tr>
    </table>

  </div>
  <br>

  <div class="padding-15">
    <div align="middle" class="div-boton-alert background-base-btn" ng-click="closeAvatar()" >
      <label class="button texto-boton background-base-btn take-picture-btn">{{ "LOGIN_LBL_14" | translate }}</label>
    </div>
  </div>

</div>
