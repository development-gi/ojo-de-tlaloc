<ion-modal-view style="background-color: rgb(250,250,250);">

  <ion-content style="width: 100%; height: 100%; background-color: rgb(250,250,250);!important; padding-top: 55px;" scroll="false">

    <ion-scroll direction="y" style="height: calc(100% - 20px)!important; padding: 10px!important;">

      <!-- M O S T R A R   A R C H I V O -->
      <div ng-if="pdfUrl !== ''" class="row" ng-click="openPdf()" style="padding: 20px!important; display: flex; flex-direction: column; align-items: center;">

        <img src="images/pdf.webp" width="50px">
        <br>
        Ver archivo

      </div>

      <!-- A G R E G A R   A R C H I V O   O   I M A G E N E S   D E   L O S   T R A B A J O S -->
      <div ng-if="images_section.length === 0 && pdfUrl === '' && type_access === 'apk_admin' " class="row" style="padding: 0!important; display: block;">

        <md-subheader class="md-no-sticky">Fotografías de la <b style="color: var(--pulse-primary-color)">{{ type_title }}</b></md-subheader>

        <div ng-show="progress_line == true" style="height: 5px;">
          <md-progress-linear md-mode="query" ng-disabled="false"></md-progress-linear>
        </div>
        <div ng-show="progress_line == false" style="height: 5px;"></div>

        <div class="before-box">
          <div class="default-title">
            <label class="before-title-purple">FOTOGRAFÍAS</label>
          </div>
          <div class="default-pictures" ng-if="array_evidence_competition_minute_base64.length === 0">
            <img src="images/landscape.png">
          </div>
          <div class="default-pictures" ng-repeat="item in array_evidence_competition_minute_base64" ng-if="array_evidence_competition_minute_base64.length > 0 && $index % 4 === 0">
            <div style="width: 100px;height: 100px;margin: 5px; border-radius: 50%;" ng-if="$index < array_evidence_competition_minute_base64.length">
              <img data-ng-src="{{array_evidence_competition_minute_base64[$index].image}}"/>
            </div>
            <div style="width: 100px;height: 100px;margin: 5px; border-radius: 50%;" ng-if="$index + 1 < array_evidence_competition_minute_base64.length">
              <img data-ng-src="{{array_evidence_competition_minute_base64[$index + 1].image}}" />
            </div>
            <div style="width: 100px;height: 100px;margin: 5px; border-radius: 50%;" ng-if="$index + 2 < array_evidence_competition_minute_base64.length">
              <img data-ng-src="{{array_evidence_competition_minute_base64[$index + 2].image}}" />
            </div>
            <div style="width: 100px;height: 100px;margin: 5px; border-radius: 50%;" ng-if="$index + 3 < array_evidence_competition_minute_base64.length">
              <img data-ng-src="{{array_evidence_competition_minute_base64[$index + 3].image}}" />
            </div>
          </div>
          <div class="default-buttons">
            <div ng-if="array_evidence_competition_minute_base64.length === 0" ng-click="photo_add()" class="default-btn-purple">Tomar evidencia
              <img src="img/photo-camera.svg">
            </div>
            <div ng-if="array_evidence_competition_minute_base64.length > 0" ng-click="photo_add()" class="default-btn-purple">Agregar otra evidencia
              <img src="img/photo-camera.svg">
            </div>
          </div>
        </div>

        <md-subheader class="md-no-sticky">Si cuenta con el archivo PDF de la <b style="color: var(--pulse-primary-color)">{{ type_title }}</b> puede agregarlo aquí.</md-subheader>

        <div class="before-box">
          <div class="default-title">
            <label class="before-title-purple">ARCHIVO PDF</label>
          </div>
          <div class="default-pictures">
            <img ng-if="file_minute.file.fileKey === null" src="images/minute.png">
            <img ng-if="file_minute.file.fileKey !== null" src="images/minute-ok.png">
          </div>
          <div class="default-buttons">
            <div ng-if="file_minute.file.fileKey === null" ng-click="selectedMinute()" class="default-btn-purple">Agregar archivo
              <img src="img/clip-de-papel.svg">
            </div>
            <div ng-if="file_minute.file.fileKey !== null" ng-click="selectedMinute()" class="default-btn-purple">Cambiar archivo
              <img src="img/clip-de-papel.svg">
            </div>
          </div>
        </div>

        <div style="padding: 10px">
          <div ng-click="validateAndSaveReport()"
               ng-class="{'btn-pulse-continue-disabled': is_evidence_minute == false, 'btn-pulse-continue': is_evidence_minute == true}">
            Enviar {{ type_title }}
          </div>
        </div>

      </div>
      <div ng-if="images_section.length === 0 && pdfUrl === '' && type_access !== 'apk_admin' " class="row"
           style="padding: 50px!important; display: flex; text-align: center; flex-direction: column; align-items: center;">
        Aún no contamos con la {{ type_title }}
      </div>

      <!-- M O S T R A R   I M A G E N E S -->
      <div ng-if="images_section.length > 0" class="row" ng-repeat="item in images_section" style="padding: 0!important;">

        <div class="col">

          <img ng-src="{{ item.image }}" style="width: 100%; border-radius: 10px!important;">

        </div>

      </div>

    </ion-scroll>

  </ion-content>

  <!-- H E A D E R -->
  <!-- B U T T O N   L E F T -->
  <md-button class="btn-back" ng-click="closeModalViewInfo()" aria-label="Settings">
    <img src="images/icons/arrow-down.png" class="toolbar-header-button-img"/>
  </md-button>

  <!-- T I T L E -->
  <div class="toolbar-header-title">
    <h3>{{ type_title }}</h3>
  </div>

</ion-modal-view>
