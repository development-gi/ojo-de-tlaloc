<ion-modal-view class="edit-target-modal">

  <!-- TOOLBAR (SIN CAMBIOS) -->
  <md-toolbar class="tlaloc-header-modal">
    <div class="md-toolbar-tools">
      <span style="width:40px;"></span>
      <h2 class="toolbar-title-modules">
        Actualizar lista
      </h2>
      <span flex></span>
      <md-button class="md-icon-button"
                 ng-click="closeModalEditTarget()"
                 aria-label="Close">
        <img src="images/new/arrow-down.svg"
             class="toolbar-icon">
      </md-button>
    </div>
  </md-toolbar>

  <!-- CONTENIDO -->
  <ion-content class="edit-target-content" style="top: 57px;">

    <!-- CARD: Información básica -->
    <md-card class="form-card">
      <md-card-content class="modal-card-content">
        <label class="form-label">Nombre de la lista</label>
        <input type="text"
               class="form-input"
               ng-model="editTargetData.lib_name"
               placeholder="Nombre de la lista">
        <label class="form-label">Tipo de lista</label>
        <select class="form-select"
                ng-model="editTargetData.lib_type">
          <option value="1">Lista de bloqueo</option>
          <option value="2">Lista de confianza</option>
        </select>
      </md-card-content>
    </md-card>

    <!-- CARD: Umbral -->
    <md-card class="form-card">
      <md-card-content class="modal-card-content">
        <div class="form-row">
          <label class="form-label">Umbral de confianza</label>
          <span class="threshold-value">
            {{ editTargetData.threshold }}%
          </span>
        </div>
        <input type="range"
               min="0"
               max="100"
               class="threshold-slider"
               ng-model="editTargetData.threshold">
      </md-card-content>
    </md-card>

    <!-- CARD: Alarmas -->
    <md-card class="form-card">
      <md-card-content class="modal-card-content">
        <div class="alarm-switch-row">
          <div class="alarm-text">
            <label class="form-label">¿Generar alarmas?</label>

            <span class="alarm-status"
                  ng-class="editTargetData.lib_link_alarm == '1'
                        ? 'status-on'
                        : 'status-off'">
          {{ editTargetData.lib_link_alarm == '1'
              ? 'Activadas'
              : 'Desactivadas' }}
        </span>
          </div>
          <!-- TOGGLE -->
          <div class="toggle-container">
            <input type="checkbox"
                   id="alarmToggle"
                   class="toggle-checkbox"
                   ng-model="editTargetData.lib_link_alarm"
                   ng-true-value="'1'"
                   ng-false-value="'0'">

            <label for="alarmToggle"
                   class="toggle-label"></label>
          </div>
        </div>
      </md-card-content>
    </md-card>


    <!-- GUARDAR -->
    <div class="save-container">
      <button class="save-button"
              ng-click="saveEditTarget()">
        Guardar información
      </button>
    </div>

  </ion-content>

</ion-modal-view>
